<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>table, th, td {
  border: 1px solid black;
}</style>
</head>

<form id="addPlaceForm" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                      
                        <div class="mb-3">
                            <label class="form-label small opacity-75" >Place Name</label>
                            <input type="text" name="name" id="placeName" class="form-control" placeholder="e.g. Maldives" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small opacity-75" name="location">Location</label>
                            <input type="text" name="location" id="placeLocation" class="form-control" placeholder="e.g. Indian Ocean" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small opacity-75" name="image">Image</label>
                            <input type="file" name="image" id="placeImg" class="form-control" accept="image/*" >
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small opacity-75" name="rating">Rating (1-5)</label>
                                <input type="number" name="rating" id="placeRating" class="form-control" step="0.1" min="1" max="5" placeholder="4.5" required>
                            </div>
                            
                        <div class="mb-3">
                            <label class="form-label small opacity-75">Description</label>
                            <textarea id="placeDesc" class="form-control" rows="3" placeholder="Tell us about this place..." required name="description"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Publish Destination</button>
                    </form>
</html>
